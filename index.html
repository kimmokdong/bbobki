<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랜덤 뽑기 (by 김현승)</title>
  <!-- Google Fonts: Outfit, Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
  <!-- Matter.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <!-- Canvas Confetti CDN -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
  <div id="app-container">
    <!-- 1. 좌측 컨트롤러 & 설정 패널 -->
    <aside id="sidebar">
      <header>
        <h1>랜덤 <span class="highlight">뽑기</span></h1>
        <p class="subtitle">물리 엔진 기반 무작위 추첨기 (by 김현승)</p>
      </header>

      <div class="sidebar-scroll custom-scrollbar">
        <!-- 구슬 일괄 등록 -->
        <div class="panel-card">
          <h3>🔮 구슬 일괄 등록</h3>
          <p class="card-desc">줄바꿈 또는 쉼표(,)로 구분하여 입력하세요.</p>
          <textarea id="marbles-input" placeholder="예:&#10;홍길동&#10;이순신,강감찬&#10;유관순"></textarea>
          <div class="button-group">
            <button id="btn-add-marbles" class="btn-primary">구슬 추가</button>
            <button id="btn-clear-marbles" class="btn-danger">전체 삭제</button>
          </div>
        </div>

        <!-- 구슬 리스트 -->
        <div class="panel-card">
          <div class="card-header">
            <h3>📋 구슬 목록 (<span id="marble-count">0</span>)</h3>
          </div>
          <div id="marbles-list-container" class="custom-scrollbar">
            <!-- 구슬 목록이 JS로 동적 생성됨 -->
            <p class="empty-msg">등록된 구슬이 없습니다. 위에 이름을 입력해 주세요.</p>
          </div>
        </div>

        <!-- 당첨 순위 설정 -->
        <div class="panel-card">
          <h3>🏆 당첨 순위 설정</h3>
          <p class="card-desc">어떤 순위의 구슬이 당첨되는지 선택하세요.</p>
          <div class="form-group">
            <div class="winner-rank-options">
              <label class="radio-card active" data-value="first">
                <input type="radio" name="winner-rank" value="first" checked>
                <span class="radio-label">🥇 1등</span>
              </label>
              <label class="radio-card" data-value="last">
                <input type="radio" name="winner-rank" value="last">
                <span class="radio-label">🐢 꼴등</span>
              </label>
              <label class="radio-card" data-value="custom">
                <input type="radio" name="winner-rank" value="custom">
                <span class="radio-label">✏️ 직접 입력</span>
              </label>
            </div>
            <div id="custom-rank-input-wrapper" class="hidden">
              <input type="number" id="custom-rank-input" min="1" value="3" placeholder="몇 등?">
              <span class="input-suffix">등</span>
            </div>
          </div>
        </div>

        <!-- 게임 및 맵 설정 -->
        <div class="panel-card">
          <h3>🗺️ 맵 및 환경 설정</h3>
          
          <div class="form-group">
            <label for="map-selector">맵 선택</label>
            <select id="map-selector">
              <option value="pinball">핀볼 숲 (Pinball Forest)</option>
              <option value="spinner">스피너 밸리 (Spinner Valley)</option>
              <option value="zigzag">지그재그 슬라이드 (Zigzag Slides)</option>
              <option value="vortex">블랙홀 소용돌이 (Vortex Hole)</option>
            </select>
          </div>

          <div class="form-group row-group">
            <div class="checkbox-wrapper">
              <input type="checkbox" id="enable-skills" checked>
              <label for="enable-skills">장풍 스킬 활성화 (교착 방지)</label>
            </div>
          </div>

          <div class="form-group">
            <label>게임 속도</label>
            <div class="speed-btns">
              <button class="btn-speed active" data-speed="1">1x</button>
              <button class="btn-speed" data-speed="1.5">1.5x</button>
              <button class="btn-speed" data-speed="2">2x</button>
              <button class="btn-speed" data-speed="3">3x</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 제어 버튼 (고정 하단) -->
      <footer class="sidebar-footer">
        <button id="btn-start" class="btn-success btn-lg">🏁 시작하기</button>
        <button id="btn-pause" class="btn-warning btn-lg" disabled>⏸️ 일시정지</button>
        <button id="btn-reset" class="btn-secondary btn-lg">🔄 재설정</button>
      </footer>
    </aside>

    <!-- 2. 중앙 게임 시뮬레이터 캔버스 영역 -->
    <main id="game-canvas-area">
      <!-- 카메라 추적 대상 표시 레이어 -->
      <div id="camera-focus-badge" class="camera-badge hidden">
        🎯 당첨 후보: <span id="camera-target-name">-</span> <span id="camera-target-rank"></span>
      </div>
      
      <div id="canvas-container">
        <!-- Matter.js Canvas가 여기에 마운트됨 -->
      </div>
      
      <!-- 전체 결과 팝업 오버레이 -->
      <div id="result-overlay" class="hidden">
        <div class="result-modal">
          <h2 class="result-title">🎉 전체 경기 결과 🎉</h2>
          <ul id="final-ranks-list" class="final-ranks-list"></ul>
          <button id="btn-close-result" class="btn-primary btn-lg" style="margin-top: 24px; width: 100%;">닫기</button>
        </div>
      </div>

      <!-- 단일 당첨자 전용 대형 팝업 오버레이 -->
      <div id="highlight-overlay" class="hidden">
        <div class="highlight-modal">
          <div id="highlight-rank" class="highlight-rank">1등 당첨!</div>
          <div id="highlight-name" class="highlight-name">이름</div>
        </div>
      </div>
    </main>

    <!-- 3. 우측 실시간 순위 패널 (상시 고정 노출) -->
    <aside id="right-sidebar">
      <div class="ranking-sidebar-header">
        <h2>순위</h2>
        <span id="game-status-badge" class="badge-status idle">대기 중</span>
      </div>
      <div id="leaderboard-container" class="custom-scrollbar">
        <p class="empty-msg">게임을 시작하면 실시간 순위가 표시됩니다.</p>
      </div>
    </aside>
  </div>

  <!-- Scripts -->
  <script src="js/maps.js"></script>
  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
